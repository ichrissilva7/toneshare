<!DOCTYPE html>
<html>
<head>
  <title>Upload Timbre</title>
</head>
<body>
  <h2>Enviar Timbre / IR</h2>

  <form action="/upload" method="POST" enctype="multipart/form-data">
    <input type="text" name="title" placeholder="Título" required><br><br>
    <input type="text" name="gear" placeholder="Equipamento usado" required><br><br>
    <textarea name="description" placeholder="Descrição"></textarea><br><br>
    <input type="file" name="file" required><br><br>
    <button type="submit">Enviar</button>
  </form>
</body>
</html>
