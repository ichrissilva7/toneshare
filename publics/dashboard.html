<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enviar Timbre - ToneShare</title>
</head>
<body>
<h1>Enviar Timbre</h1>
<form action="/upload" method="POST" enctype="multipart/form-data">
  <input type="text" name="nome" placeholder="Nome do timbre" required><br><br>
  <input type="text" name="descricao" placeholder="Descrição"><br><br>
  <input type="file" name="arquivo" required><br><br>
  <button type="submit">Enviar Timbre</button>
</form>
</body>
</html>
